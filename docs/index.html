<head>

  <title>Drift — Connect. Meet. Drift with purpose.</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; color: #0f0f23; }

    .btn-outline { background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.6); }
    footer { text-align: center; padding: 32px; font-size: 14px; color: #9ca3af; }
